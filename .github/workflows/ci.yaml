# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: uv CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      # Gives the action the necessary permissions for publishing new
      # comments in pull requests.
      pull-requests: write
      # Gives the action the necessary permissions for pushing data to the
      # python-coverage-comment-action branch, and for editing existing
      # comments (to avoid publishing multiple comments in the same PR)
      contents: write

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --python ${{ matrix.python-version }}

    - name: check
      run: |
        uv run ruff format --check src/ test/
        uv run ruff check
        uv run ty check src/ridgeplot
        uv run pytest -l -rPap -vvv -p no:warnings --cov

    - uses: py-cov-action/python-coverage-comment-action@v3
      id: coverage_comment
      if: matrix.python-version == '3.9' && github.ref != 'refs/heads/main'
      with:
        GITHUB_TOKEN: ${{ github.token }}
        ANNOTATE_MISSING_LINES: true


  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build dist
      run: |
        uv build --verbose

    - name: publish to pypi
      run: |
        uv publish --token ${{ secrets.PYPI_TOKEN }} --verbose

    - name: push tag
      run: |
        VERSION=$(uv run python -c "from importlib.metadata import version; print(version('ridgeplot-py'))")
        gh release create "$VERSION"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  deploy:
    name: deploy doc
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [publish, build]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/configure-pages@v5

    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: setup
      run: uv python install 3.12

    - name: build doc
      run: |
        uv sync --python 3.12
        uv run zensical build --clean

    - uses: actions/upload-pages-artifact@v4
      with:
        path: site

    - uses: actions/deploy-pages@v4
      id: deployment
